{% extends 'base.html' %}
{% block title %}Add Question — {{ exam.title }}{% endblock %}
{% block content %}
<div class="page-wrapper" style="max-width:680px;">
  <div class="page-header">
    <div>
      <h1 class="page-title">Add Question</h1>
      <p class="page-subtitle">{{ exam.title }}</p>
    </div>
    <a href="/teacher/questions/{{ exam.id }}" class="btn btn-secondary">← Question Paper</a>
  </div>

  {% if messages %}
  {% for message in messages %}
  <div class="alert alert-{{ message.tags }}" style="margin-bottom:1rem;">{{ message }}</div>
  {% endfor %}
  {% endif %}

  <div class="card">
    <div class="card-body">
      <form method="POST">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Question Text</label>
          <textarea name="question_text" class="form-control" placeholder="Write your question here..." required></textarea>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
          <div class="form-group">
            <label class="form-label">Option 1</label>
            <input type="text" name="option1" class="form-control" placeholder="Option A" required>
          </div>
          <div class="form-group">
            <label class="form-label">Option 2</label>
            <input type="text" name="option2" class="form-control" placeholder="Option B" required>
          </div>
          <div class="form-group">
            <label class="form-label">Option 3</label>
            <input type="text" name="option3" class="form-control" placeholder="Option C" required>
          </div>
          <div class="form-group">
            <label class="form-label">Option 4</label>
            <input type="text" name="option4" class="form-control" placeholder="Option D" required>
          </div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem;">
          <div class="form-group">
            <label class="form-label">Correct Answer</label>
            <select name="correct_answer" class="form-control" required>
              <option value="">Select answer</option>
              <option value="option1">Option 1</option>
              <option value="option2">Option 2</option>
              <option value="option3">Option 3</option>
              <option value="option4">Option 4</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Marks</label>
            <input type="number" name="marks" class="form-control" value="1" min="1" max="10" required>
          </div>
          <div class="form-group">
            <label class="form-label">Section</label>
            <select name="section" class="form-control">
              <option value="A">Section A</option>
              <option value="B">Section B</option>
              <option value="C">Section C</option>
            </select>
          </div>
        </div>
        <div class="divider"></div>
        <div style="display:flex; gap:0.75rem;">
          <button type="submit" name="add_another" value="1" class="btn btn-secondary">Save &amp; Add Another</button>
          <button type="submit" class="btn btn-primary" style="flex:1;">Save Question →</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
